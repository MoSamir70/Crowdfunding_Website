        <nav id="main-nav">

    <section class="hero">

    <script src="js/campaigns.js" defer></script>

    <script>
      function updateNav() {

        const user = JSON.parse(localStorage.getItem("currentUser"));
        const nav = document.getElementById("main-nav");

        // if user is guest / not signed
        if (!user) {
          nav.innerHTML = ` <a href="index.html" class="active">Home</a>
                            <a href="#">Browse Campaigns</a>
                            <a href="login.html">Login</a>
                            <a href="register.html" class="btn btn-primary">Register</a> `;
          return;
        }

        // if user is signed
        let links = ` <a href="index.html">Home</a>
                      <a href="#">Browse Campaigns</a>
                      <a href="start-campaign.html">Start a Campaign</a>
                      <a href="my-campaigns.html">My Campaigns</a>`;

        // admin user
        if (user.role === "admin") {
          links += `<a href="admin.html">Admin Dashboard</a>`;
        }

        // Logout
        links += `<a href="#" onclick="logout()">Logout</a>`;

        nav.innerHTML = links;
      }

      function logout() {
        localStorage.removeItem("currentUser"); // remove user data
        alert("Logged out successfully");
        window.location.href = "index.html"; // back to home
      }

      // load the page then do updateNav
      document.addEventListener("DOMContentLoaded", () => { updateNav(); });
    </script>
  </body>
</html>
